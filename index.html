<title>Bucket Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#3B6D11;--green-light:#4a8c1c;--green-bg:#EAF3DE;
  --red:#993C1D;--red-bg:#FAECE7;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --gold:#BA7517;--gold-bg:#FAEEDA;
  --bg:#f7f6f2;--surface:#ffffff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);
  --r:14px;--rsm:10px;--rxs:8px;
  --font:'DM Sans',system-ui,sans-serif;
  --display:'Bebas Neue',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;background:var(--bg);}
body{
  font-family:var(--font);color:var(--text);background:var(--bg);min-height:100%;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));
  padding-left:calc(16px + env(safe-area-inset-left,0px));
  padding-right:calc(16px + env(safe-area-inset-right,0px));
  overscroll-behavior:none;
}
.app{max-width:460px;margin:0 auto;}
.hdr{text-align:center;padding:8px 0 4px;}
.hdr h1{font-family:var(--display);font-size:52px;letter-spacing:3px;line-height:1;color:var(--text);}
.hdr p{font-size:13px;color:var(--text2);margin-top:2px;}
.save-pill{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--text3);margin:6px 0 10px;}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green-light);flex-shrink:0;}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 16px;height:44px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;font-family:var(--font);font-weight:500;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;user-select:none;transition:transform 0.1s,opacity 0.12s;white-space:nowrap;}
.btn:active{transform:scale(0.95);opacity:0.8;}
.btn:disabled{opacity:0.3;pointer-events:none;}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text);}
.btn-green{background:var(--green-light);color:#fff;border-color:var(--green);}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.cnt-btn{aspect-ratio:1;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface2);font-family:var(--display);font-size:28px;letter-spacing:1px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-appearance:none;transition:transform 0.1s;}
.cnt-btn:active{transform:scale(0.9);}
.pinput{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.pinput input{flex:1;height:44px;padding:0 14px;border:1px solid var(--border2);border-radius:var(--rsm);font-size:16px;background:var(--surface);color:var(--text);font-family:var(--font);-webkit-appearance:none;outline:none;}
.pinput input:focus{border-color:var(--blue);}

canvas#confettiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:998;}
@keyframes popIn{from{transform:scale(0.5) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes emoPop{0%{transform:scale(0) rotate(-20deg)}65%{transform:scale(1.25) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-5px)}60%{transform:translateX(5px)}80%{transform:translateX(-3px)}}
@keyframes pulseBlue{0%,100%{border-color:var(--border);background:var(--surface)}50%{border-color:var(--blue);background:var(--blue-bg)}}
@keyframes pulseGold{0%,100%{border-color:var(--border);background:var(--surface)}50%{border-color:var(--gold);background:var(--gold-bg)}}
.fx-shake{animation:shake 0.55s ease;}
.fx-blue{animation:pulseBlue 0.65s ease 2;}
.fx-gold{animation:pulseGold 0.65s ease 3;}
</style>
</head>
<body>
<canvas id="confettiCanvas" style="display:none;"></canvas>
<div class="app">
  <div class="hdr">
    <h1>&#x26F3; BUCKET GOLF</h1>
    <p>Par 4 &middot; 9 Holes &middot; No Mercy</p>
  </div>
  <div class="save-pill">
    <div class="save-dot"></div>
    <span id="saveMsg">Progress auto-saved</span>
  </div>
  <div id="root"></div>
  <div id="cel"></div>
</div>

<script>
var PAR = 4;
var SK = 'bucket_golf_v5';

/*
  Per-hole hazard counts (separate from fireballs so +/- is clean):
    S.waterCount[hole][playerIdx]  = number of water hazards (+1 fireball each)
    S.craftCount[hole][playerIdx]  = number of watercraft hazards (+2 fireballs each)

  Stroke bonus tracking (for reversal if score is changed):
    S.strokeBonus[hole][playerIdx] = fireball bonus given to OTHER players from this player's 0 or 1
*/
var S = {
  phase: 'setup-count',
  playerCount: 0,
  players: [],
  scores: [],
  fireballs: [],
  holeFireballs: [],
  strokeBonus: [],
  waterCount: [],
  craftCount: [],
  currentHole: 0,
  history: [],
  lastAction: null,
  showScorecard: false
};

// ── Array initializers ──
function make9x8() {
  var arr = [];
  for (var h = 0; h < 9; h++) {
    var row = [];
    for (var p = 0; p < 8; p++) row.push(0);
    arr.push(row);
  }
  return arr;
}

// ── Score info ──
function getInfo(s) {
  if (s === null) return { l: '', cls: '', sym: '' };
  var d = s - PAR;
  if (s === 0) return { l: 'Hole in Zero', cls: 'sc0', sym: '0' };
  if (s === 1) return { l: 'Hole in One', cls: 'sc1', sym: '1' };
  if (d <= -2) return { l: 'Eagle', cls: 'sc-eagle', sym: s };
  if (d === -1) return { l: 'Birdie', cls: 'sc-birdie', sym: s };
  if (d === 0) return { l: 'Par', cls: 'sc-par', sym: s };
  if (d === 1) return { l: 'Bogey', cls: 'sc-bog', sym: s };
  if (d === 2) return { l: 'Double Bogey', cls: 'sc-dbl', sym: s };
  return { l: 'Triple+ Bogey', cls: 'sc-tri', sym: s };
}
function scHTML(s) {
  if (s === null) return '<span style="color:#ccc;font-size:11px;">&middot;</span>';
  var i = getInfo(s);
  return '<span class="sc ' + i.cls + '" title="' + i.l + '">' + i.sym + '</span>';
}
function getTot(idx) {
  return S.scores[idx].reduce(function(a, v) { return a + (v !== null ? v : 0); }, 0);
}
function holeDone(h) {
  return S.scores.every(function(r) { return r[h] !== null; });
}
function allDone() {
  return S.scores.every(function(r) { return r.every(function(v) { return v !== null; }); });
}

// ── Compute total fireballs for a player on a specific hole from hazard counts ──
function hazardFireballsForHole(h, pi) {
  return (S.waterCount[h][pi] * 1) + (S.craftCount[h][pi] * 2);
}

// ── Recompute all fireball totals from scratch (source of truth) ──
function recomputeFireballs() {
  // Reset everything
  S.fireballs = [];
  S.holeFireballs = [];
  for (var i = 0; i < S.playerCount; i++) { S.fireballs.push(0); S.holeFireballs.push(0); }

  var h = S.currentHole;

  for (var hole = 0; hole < 9; hole++) {
    for (var pi = 0; pi < S.playerCount; pi++) {
      // Water/craft hazards earned BY this player on this hole
      var hazard = hazardFireballsForHole(hole, pi);
      S.fireballs[pi] += hazard;
      if (hole === h) S.holeFireballs[pi] += hazard;

      // Stroke bonus: if this player scored 0 or 1, others get fireballs
      var bonus = S.strokeBonus[hole][pi];
      if (bonus > 0) {
        for (var oi = 0; oi < S.playerCount; oi++) {
          if (oi !== pi) {
            S.fireballs[oi] += bonus;
            if (hole === h) S.holeFireballs[oi] += bonus;
          }
        }
      }
    }
  }
}

// ── Save / Load ──
var _saveTimer = null;
function persist() {
  try {
    localStorage.setItem(SK, JSON.stringify({
      phase: S.phase, playerCount: S.playerCount, players: S.players,
      scores: S.scores, fireballs: S.fireballs, holeFireballs: S.holeFireballs,
      strokeBonus: S.strokeBonus, waterCount: S.waterCount, craftCount: S.craftCount,
      currentHole: S.currentHole, lastAction: S.lastAction
    }));
    flashSave('&#10003; Saved');
  } catch(e) {}
}
function hasSave() {
  try {
    var raw = localStorage.getItem(SK);
    if (!raw) return false;
    var d = JSON.parse(raw);
    return d && d.phase && d.phase !== 'setup-count' && d.phase !== 'setup-names';
  } catch(e) { return false; }
}
function loadSave() {
  try {
    var d = JSON.parse(localStorage.getItem(SK));
    if (!d || !d.phase) return false;
    S.phase = d.phase; S.playerCount = d.playerCount || 0;
    S.players = d.players || []; S.scores = d.scores || [];
    S.fireballs = d.fireballs || []; S.holeFireballs = d.holeFireballs || [];
    S.strokeBonus = d.strokeBonus || make9x8();
    S.waterCount = d.waterCount || make9x8();
    S.craftCount = d.craftCount || make9x8();
    S.currentHole = d.currentHole || 0; S.lastAction = d.lastAction || null;
    S.history = []; S.showScorecard = false;
    return true;
  } catch(e) { return false; }
}
function clearSave() { try { localStorage.removeItem(SK); } catch(e) {} }
function flashSave(msg) {
  var el = document.getElementById('saveMsg');
  if (el) el.innerHTML = msg;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function() {
    var el2 = document.getElementById('saveMsg');
    if (el2) el2.textContent = 'Progress auto-saved';
  }, 2000);
}

// ── History / Undo ──
function snapState() {
  return JSON.parse(JSON.stringify({
    scores: S.scores, fireballs: S.fireballs, holeFireballs: S.holeFireballs,
    strokeBonus: S.strokeBonus, waterCount: S.waterCount, craftCount: S.craftCount,
    lastAction: S.lastAction
  }));
}
function saveHistory() { S.history.push(snapState()); }
function undo() {
  if (!S.history.length) return;
  var p = S.history.pop();
  S.scores = p.scores; S.fireballs = p.fireballs; S.holeFireballs = p.holeFireballs;
  S.strokeBonus = p.strokeBonus; S.waterCount = p.waterCount; S.craftCount = p.craftCount;
  S.lastAction = p.lastAction;
  persist(); render();
}

// ── Navigation ──
function initGame() {
  S.scores = [];
  for (var i = 0; i < S.playerCount; i++) S.scores.push([null,null,null,null,null,null,null,null,null]);
  S.fireballs = []; S.holeFireballs = [];
  for (var j = 0; j < S.playerCount; j++) { S.fireballs.push(0); S.holeFireballs.push(0); }
  S.strokeBonus = make9x8(); S.waterCount = make9x8(); S.craftCount = make9x8();
  S.history = []; S.lastAction = null; S.currentHole = 0;
  S.phase = 'playing'; S.showScorecard = false;
  persist();
}
function nextHole() {
  if (S.currentHole < 8) { S.currentHole++; recomputeFireballs(); persist(); render(); }
}
function prevHole() {
  if (S.currentHole > 0) { S.currentHole--; recomputeFireballs(); persist(); render(); }
}
function finishGame() { S.phase = 'results'; S.showScorecard = false; persist(); render(); celebrateEnd(); }
function newGame() {
  clearSave();
  S.phase = 'setup-count'; S.playerCount = 0; S.players = []; S.scores = [];
  S.fireballs = []; S.holeFireballs = []; S.strokeBonus = make9x8();
  S.waterCount = make9x8(); S.craftCount = make9x8(); S.currentHole = 0;
  S.history = []; S.lastAction = null; S.showScorecard = false;
  document.getElementById('cel').innerHTML = ''; render();
}
function selectCount(n) { S.playerCount = n; S.players = []; for (var i = 0; i < n; i++) S.players.push(''); S.phase = 'setup-names'; render(); }
function toggleCard() { S.showScorecard = !S.showScorecard; render(); }
function confirmNewGame() {
  document.getElementById('cel').innerHTML =
    '<div class="cel-wrap">' +
      '<div class="cel-bg" onclick="dismissCel()"></div>' +
      '<div class="cel-box" style="border:2px solid var(--red);">' +
        '<span class="cel-emo">&#x1F6A8;</span>' +
        '<div class="cel-title" style="color:var(--red);">Start Over?</div>' +
        '<div class="cel-sub">Your current game will be lost. You sure?</div>' +
        '<div style="display:flex;gap:10px;margin-top:16px;justify-content:center;">' +
          '<button class="btn" onclick="dismissCel()" style="flex:1;">Cancel</button>' +
          '<button class="btn btn-red" onclick="dismissCel();newGame();" style="flex:1;">Yes, New Game</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}
function startGame() {
  var names = [];
  for (var i = 0; i < S.playerCount; i++) {
    var el = document.getElementById('pn' + i);
    names.push(el && el.value.trim() ? el.value.trim() : 'Player ' + (i + 1));
  }
  S.players = names; initGame(); render();
}
function resumeGame() { if (loadSave()) render(); }
function goBackToCount() { S.phase = 'setup-count'; render(); }
function checkNames() {
  var btn = document.getElementById('startBtn');
  if (!btn) return;
  var allFilled = true;
  for (var i = 0; i < S.playerCount; i++) {
    var el = document.getElementById('pn' + i);
    if (!el || !el.value.trim()) { allFilled = false; break; }
  }
  btn.disabled = !allFilled;
  btn.textContent = allFilled ? 'Tee it up ⛳' : 'Name all players to continue';
}

// ── Hazard counter: add/remove water or craft per player per hole ──
function changeHazard(pi, type, delta) {
  saveHistory();
  var h = S.currentHole;
  var nm = S.players[pi];
  if (type === 'water') {
    S.waterCount[h][pi] = Math.max(0, S.waterCount[h][pi] + delta);
    S.lastAction = nm + ': Water Hazards = ' + S.waterCount[h][pi];
    if (delta > 0) {
      showCel('&#x1F4A7;', 'Water Hazard!', nm + ' found the drink. +1 fireball.', true);
      fxRow(pi, 'fx-shake');
    }
  } else {
    S.craftCount[h][pi] = Math.max(0, S.craftCount[h][pi] + delta);
    S.lastAction = nm + ': Watercraft Hazards = ' + S.craftCount[h][pi];
    if (delta > 0) {
      showCel('&#x26F5;', 'Watercraft Required?!', nm + ' needed a boat. That\'s a talent. +2 fireballs.', true);
      fxRow(pi, 'fx-shake');
    }
  }
  recomputeFireballs();
  persist(); render();
}

// ── Stroke (with bonus reversal via recompute) ──
function setStroke(pi, hole, val) {
  saveHistory();
  S.scores[pi][hole] = val;
  var nm = S.players[pi];
  var inf = getInfo(val);

  // Update strokeBonus for this player on this hole
  if (val === 0) S.strokeBonus[hole][pi] = 2;
  else if (val === 1) S.strokeBonus[hole][pi] = 1;
  else S.strokeBonus[hole][pi] = 0;

  // Recompute all fireballs from scratch — cleanly handles corrections
  recomputeFireballs();

  if (val === 0) {
    S.lastAction = nm + ': Hole in Zero! Everyone else +2 🔥';
    showCel('🦄', 'HOLE IN ZERO!', nm + ' is a fucking legend. Everyone else drinks twice.');
    fxRow(pi, 'fx-gold');
  } else if (val === 1) {
    S.lastAction = nm + ': Hole in One! Everyone else +1 🔥';
    showCel('🎯', 'HOLE IN ONE!', nm + ' is a bucket golf genius. Everyone else drinks.');
    fxRow(pi, 'fx-blue');
  } else if (val === 2) {
    S.lastAction = nm + ': Eagle';
    showCel('🦅', 'Eagle!', nm + ' &mdash; 2 under par. Absolutely cooking.');
    fxRow(pi, 'fx-blue');
  } else if (val === 3) {
    S.lastAction = nm + ': Birdie';
    showCel('🐦', 'Birdie!', nm + ' &mdash; 1 under par. Smooth.');
    fxRow(pi, 'fx-blue');
  } else if (val === 5) {
    S.lastAction = nm + ': Bogey';
    showCel('😬', 'Bogey.', nm + ' &mdash; 1 over par. Walk of shame.', true);
    fxRow(pi, 'fx-shake');
  } else if (val === 6) {
    S.lastAction = nm + ': Double Bogey';
    showCel('😤', 'Double Bogey!!', nm + ' might wanna reconsider their life choices.', true);
    fxRow(pi, 'fx-shake');
  } else if (val >= 7) {
    S.lastAction = nm + ': Triple+ Bogey';
    showCel('😵', 'Triple+ Bogey!!!', nm + ' is making this look hard. Someone hand them a beer.', true);
    fxRow(pi, 'fx-shake');
  } else {
    S.lastAction = nm + ': ' + val + ' strokes (' + inf.l + ')';
  }
  persist(); render();
}

// ── Animations ──
function fxRow(pi, cls) {
  var el = document.getElementById('pr' + pi);
  if (!el) return;
  el.classList.remove('fx-shake', 'fx-blue', 'fx-gold');
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(function() { var e = document.getElementById('pr' + pi); if (e) e.classList.remove(cls); }, 1500);
}

// ── Confetti ──
function launchConfetti(duration) {
  var cv = document.getElementById('confettiCanvas');
  cv.style.display = 'block';
  var ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  var colors = ['#3B6D11','#185FA5','#993C1D','#534AB7','#BA7517','#e67e22'];
  var pts = [];
  for (var k = 0; k < 130; k++) {
    pts.push({ x: Math.random()*cv.width, y: Math.random()*-cv.height, r: Math.random()*6+3,
      d: Math.random()*120, c: colors[Math.floor(Math.random()*colors.length)],
      tilt: Math.random()*10-10, ts: Math.random()*0.1+0.02 });
  }
  var startTime = null;
  function frame(ts) {
    if (startTime === null) startTime = ts;
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.y += 3 + Math.sin(p.d)*2; p.x += Math.sin(p.d)*1.5; p.d += p.ts; p.tilt += 0.1;
      ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.c;
      ctx.moveTo(p.x+p.tilt+p.r/2, p.y); ctx.lineTo(p.x+p.tilt, p.y+p.tilt+p.r/2); ctx.stroke();
      if (p.y > cv.height) p.y = -10;
    }
    if (ts - startTime < duration) requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, cv.width, cv.height); cv.style.display = 'none'; }
  }
  requestAnimationFrame(frame);
}

// ── Celebrations ──
function showCel(emo, title, sub, bad) {
  if (!bad) launchConfetti(2000);
  document.getElementById('cel').innerHTML =
    '<div class="cel-wrap">' +
      '<div class="cel-bg" onclick="dismissCel()"></div>' +
      '<div class="cel-box"' + (bad ? ' style="border:2px solid var(--red);"' : '') + '>' +
        '<span class="cel-emo">' + emo + '</span>' +
        '<div class="cel-title"' + (bad ? ' style="color:var(--red);"' : '') + '>' + title + '</div>' +
        '<div class="cel-sub">' + sub + '</div>' +
        '<button class="btn ' + (bad ? 'btn-red' : 'btn-dark') + ' cel-btn" onclick="dismissCel()">' + (bad ? 'Oof.' : 'Niiice!') + '</button>' +
      '</div>' +
    '</div>';
}
function dismissCel() { document.getElementById('cel').innerHTML = ''; }
function celebrateEnd() {
  var ranked = S.players.map(function(n, i) { return { n: n, s: getTot(i) }; });
  ranked.sort(function(a, b) { return a.s - b.s; });
  var w = ranked[0]; var l = ranked[ranked.length - 1];
  launchConfetti(5000);
  setTimeout(function() {
    document.getElementById('cel').innerHTML =
      '<div class="cel-wrap"><div class="cel-bg"></div><div class="cel-box">' +
        '<span class="cel-emo">&#x1F3C6;</span>' +
        '<div class="cel-title">' + w.n + ' WINS!</div>' +
        '<div class="cel-sub" style="margin-bottom:10px;">' + w.s + ' strokes &mdash; bucket golf champion</div>' +
        '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;">' +
          '<div style="font-size:14px;font-weight:600;color:var(--red);line-height:1.5;">&#x1F37A; ' + l.n + ', you can shotgun a beer AND take a Fireball shot, you little bitch.</div>' +
        '</div>' +
        '<button class="btn btn-dark cel-btn" onclick="dismissCel()">Let\'s go!</button>' +
      '</div></div>';
  }, 500);
}

// ── Scorecard ──
var LEGEND = '<div class="legend">' +
  '<span class="leg"><span class="sc sc0" style="width:20px;height:20px;font-size:9px;">0</span>Zero</span>' +
  '<span class="leg"><span class="sc sc1" style="width:20px;height:20px;font-size:9px;">1</span>Ace</span>' +
  '<span class="leg"><span class="sc sc-eagle" style="width:20px;height:20px;font-size:9px;">2</span>Eagle</span>' +
  '<span class="leg"><span class="sc sc-birdie" style="width:20px;height:20px;font-size:9px;">3</span>Birdie</span>' +
  '<span class="leg"><span class="sc sc-par" style="width:20px;height:20px;font-size:9px;">4</span>Par</span>' +
  '<span class="leg"><span class="sc sc-bog" style="width:20px;height:20px;font-size:9px;">5</span>Bogey</span>' +
  '<span class="leg"><span class="sc sc-dbl" style="width:20px;height:20px;font-size:9px;">6</span>Double</span>' +
  '<span class="leg"><span class="sc sc-tri" style="width:20px;height:20px;font-size:9px;">7+</span>Triple+</span>' +
'</div>';

function buildCard(modal) {
  var h = S.currentHole;
  var rows = '';
  for (var pi = 0; pi < S.players.length; pi++) {
    var cells = '';
    for (var i = 0; i < 9; i++) {
      var v = S.scores[pi][i];
      var cur = modal && S.phase === 'playing' && i === h;
      cells += '<td style="text-align:center;padding:5px 4px;' + (cur ? 'background:#E6F1FB;' : '') + '">' + scHTML(v) + '</td>';
    }
    var t = getTot(pi);
    var played = 0;
    for (var k = 0; k < S.scores[pi].length; k++) { if (S.scores[pi][k] !== null) played++; }
    var vp = t - (played * PAR);
    var vs = vp === 0 ? 'E' : (vp > 0 ? '+' + vp : vp);
    var vpColor = vp < 0 ? 'var(--blue)' : (vp > 0 ? 'var(--red)' : 'var(--text2)');
    rows += '<tr><td style="font-weight:600;white-space:nowrap;padding:5px;">' + S.players[pi] + '</td>' + cells +
      '<td style="text-align:center;font-weight:700;padding:5px;">' + t + '</td>' +
      '<td style="text-align:center;font-size:12px;font-weight:600;padding:5px;color:' + vpColor + ';">' + vs + '</td></tr>';
  }
  var hdrs = '';
  for (var n = 0; n < 9; n++) {
    var isCur = modal && S.phase === 'playing' && n === h;
    hdrs += '<th style="text-align:center;' + (isCur ? 'color:var(--blue);' : '') + '">' + (n + 1) + '</th>';
  }
  return '<div class="scroll-x"><table class="stbl"><thead><tr><th>Player</th>' + hdrs +
    '<th style="text-align:center;">Tot</th><th style="text-align:center;">vPar</th></tr></thead><tbody>' + rows + '</tbody></table></div>' + LEGEND;
}

// ── Render ──
function render() {
  var root = document.getElementById('root');
  if (!root) return;

  if (S.phase === 'setup-count') {
    var resumeBanner = hasSave()
      ? '<div class="resume-banner"><div class="resume-text">&#x1F4C2; You have a game in progress</div><button class="btn btn-green" onclick="resumeGame()" style="height:38px;font-size:13px;">Resume</button></div>'
      : '';
    var countBtns = '';
    var counts = [2,3,4,5,6,7,8];
    for (var c = 0; c < counts.length; c++) countBtns += '<button class="cnt-btn" onclick="selectCount(' + counts[c] + ')">' + counts[c] + '</button>';
    root.innerHTML = resumeBanner + '<div class="card"><div class="lbl">How many players?</div><div class="count-grid">' + countBtns + '</div></div>';
    return;
  }

  if (S.phase === 'setup-names') {
    var inputs = '';
    for (var ii = 0; ii < S.playerCount; ii++) {
      inputs += '<div class="pinput"><div class="nbadge">' + (ii+1) + '</div>' +
        '<input type="text" id="pn' + ii + '" placeholder="Player ' + (ii+1) + '" value="' + (S.players[ii]||'') + '" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" oninput="checkNames()"/></div>';
    }
    root.innerHTML =
      '<div class="card">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
          '<button class="btn" onclick="goBackToCount()" style="height:36px;padding:0 12px;font-size:13px;">&#8592; Change players</button>' +
        '</div>' +
        '<div class="lbl">Name your players</div>' +
        inputs +
        '<button id="startBtn" class="btn btn-green" style="width:100%;margin-top:6px;font-size:15px;" onclick="startGame()" disabled>Name all players to continue</button>' +
      '</div>';
    setTimeout(function() { var f = document.getElementById('pn0'); if (f) f.focus(); checkNames(); }, 80);
    return;
  }

  if (S.phase === 'playing') {
    var h = S.currentHole;
    var ub = S.history.length
      ? '<div class="ubar"><span>' + (S.lastAction||'') + '</span><button class="btn" onclick="undo()">Undo</button></div>'
      : '';

    var rows = '';
    for (var pi = 0; pi < S.players.length; pi++) {
      var sv = S.scores[pi][h];
      var inf = sv !== null ? getInfo(sv) : null;
      var opts = '<option value="" disabled' + (sv === null ? ' selected' : '') + '>Pick</option>';
      for (var v = 0; v <= 10; v++) opts += '<option value="' + v + '"' + (sv === v ? ' selected' : '') + '>' + v + '</option>';
      var holeChip = sv !== null ? '<span class="sc ' + inf.cls + '" style="width:22px;height:22px;font-size:11px;">' + inf.sym + '</span>' : '&mdash;';

      var wc = S.waterCount[h][pi];
      var cc = S.craftCount[h][pi];

      // Hazard +/- rows
      var hazardHTML =
        '<div class="hazard-section">' +
          '<div class="hazard-row">' +
            '<span class="hazard-icon">&#x1F4A7;</span>' +
            '<span class="hazard-label">Water Hazard <span style="font-size:10px;color:var(--text3);">(+1 &#x1F525; each)</span></span>' +
            '<button class="pm-btn minus" onclick="changeHazard(' + pi + ',\'water\',-1)"' + (wc === 0 ? ' disabled' : '') + '>&#8722;</button>' +
            '<span class="hazard-count blue">' + wc + '</span>' +
            '<button class="pm-btn plus" onclick="changeHazard(' + pi + ',\'water\',1)">+</button>' +
          '</div>' +
          '<div class="hazard-row">' +
            '<span class="hazard-icon">&#x26F5;</span>' +
            '<span class="hazard-label">Watercraft <span style="font-size:10px;color:var(--text3);">(+2 &#x1F525; each)</span></span>' +
            '<button class="pm-btn minus" onclick="changeHazard(' + pi + ',\'craft\',-1)"' + (cc === 0 ? ' disabled' : '') + '>&#8722;</button>' +
            '<span class="hazard-count purple">' + cc + '</span>' +
            '<button class="pm-btn plus-craft pm-btn" onclick="changeHazard(' + pi + ',\'craft\',1)">+</button>' +
          '</div>' +
        '</div>';

      rows +=
        '<div class="prow" id="pr' + pi + '">' +
          '<div class="pname">' + S.players[pi] + (sv !== null ? '<span class="pname-tag">' + inf.l + '</span>' : '') + '</div>' +
          '<div class="chips">' +
            '<div class="chip"><div class="chip-lbl">Hole Strokes</div><div class="chip-val">' + holeChip + '</div></div>' +
            '<div class="chip"><div class="chip-lbl">Game Strokes</div><div class="chip-val">' + getTot(pi) + '</div></div>' +
            '<div class="chip"><div class="chip-lbl">Hole &#x1F525;</div><div class="chip-val fire">' + S.holeFireballs[pi] + '</div></div>' +
            '<div class="chip"><div class="chip-lbl">Game &#x1F525;</div><div class="chip-val fire">' + S.fireballs[pi] + '</div></div>' +
          '</div>' +
          '<div class="stroke-row"><span class="stroke-lbl">Strokes:</span>' +
            '<select class="stroke-sel" onchange="setStroke(' + pi + ',' + h + ',parseInt(this.value))">' + opts + '</select>' +
          '</div>' +
          hazardHTML +
        '</div>';
    }

    var dots = '';
    for (var di = 0; di < 9; di++) dots += '<div class="hdot' + (di < h ? ' done' : di === h ? ' cur' : '') + '"></div>';

    var navRight = h < 8
      ? '<button class="btn btn-dark" onclick="nextHole()"' + (!holeDone(h) ? ' disabled' : '') + '>Next &rarr;</button>'
      : '<button class="btn btn-green" onclick="finishGame()"' + (!allDone() ? ' disabled' : '') + '>Finish &#x1F3C1;</button>';

    var scorecard = S.showScorecard
      ? '<div class="modal-bd" onclick="if(event.target===this)toggleCard()"><div class="modal">' +
          '<div class="modal-hdr"><div class="modal-title">SCORECARD</div>' +
          '<button class="btn" onclick="toggleCard()" style="height:38px;padding:0 12px;">&#x2715; Close</button></div>' +
          buildCard(true) + '</div></div>'
      : '';

    root.innerHTML = ub +
      '<div class="topbar">' +
        '<div><div class="hole-big">HOLE ' + (h+1) + '</div><div class="hole-sm">' + (h+1) + ' of 9 &middot; Par ' + PAR + '</div></div>' +
        '<div style="display:flex;gap:6px;">' +
          '<button class="btn" onclick="toggleCard()" style="font-size:13px;">&#x1F4CB; Card</button>' +
          '<button class="btn btn-red" onclick="confirmNewGame()" style="font-size:13px;">New Game</button>' +
        '</div>' +
      '</div>' +
      '<div class="card" style="padding:12px;">' + rows +
        '<div class="hdots">' + dots + '</div>' +
        '<div class="hnav">' +
          '<button class="btn" onclick="prevHole()"' + (h === 0 ? ' disabled' : '') + '>&larr; Back</button>' +
          navRight +
        '</div>' +
      '</div>' + scorecard;
    return;
  }

  if (S.phase === 'results') {
    var totals = S.players.map(function(_, i) { return getTot(i); });
    var ranked = S.players.map(function(nm, i) { return { nm: nm, s: totals[i], fb: S.fireballs[i] }; });
    ranked.sort(function(a, b) { return a.s - b.s; });
    var w = ranked[0]; var l = ranked[ranked.length-1];
    var standRows = '';
    for (var ri = 0; ri < ranked.length; ri++) {
      var rp = ranked[ri];
      var rvp = rp.s - (9*PAR); var rvs = rvp === 0 ? 'E' : (rvp > 0 ? '+'+rvp : rvp);
      var rcol = rvp < 0 ? 'var(--blue)' : (rvp > 0 ? 'var(--red)' : 'var(--text2)');
      standRows += '<tr><td style="font-weight:700;">' + (ri+1) + '</td><td style="font-weight:600;">' + rp.nm + '</td><td>' + rp.s + '</td><td style="color:' + rcol + ';">' + rvs + '</td><td>&#x1F525; ' + rp.fb + '</td></tr>';
    }
    root.innerHTML =
      '<div class="win-card">' +
        '<div class="res-badge" style="color:var(--green);">&#x1F3C6; Winner</div>' +
        '<div class="res-name" style="color:var(--green);">' + w.nm + '</div>' +
        '<div class="res-detail" style="color:var(--green);">' + w.s + ' strokes &middot; &#x1F525; ' + w.fb + ' fireballs</div>' +
      '</div>' +
      '<div class="lose-card">' +
        '<div class="res-badge" style="color:var(--red);">&#x1F480; Loser</div>' +
        '<div class="res-name" style="color:var(--red);">' + l.nm + '</div>' +
        '<div class="res-detail" style="color:var(--red);">' + l.s + ' strokes &middot; &#x1F525; ' + l.fb + ' fireballs</div>' +
        '<div class="res-penalty">' + l.nm + ', you can shotgun a beer AND take a Fireball shot, you little bitch.</div>' +
      '</div>' +
      '<div class="card"><div class="lbl">Final Standings</div>' +
        '<table class="stbl"><thead><tr><th>#</th><th>Player</th><th>Strokes</th><th>vs Par</th><th>&#x1F525;</th></tr></thead><tbody>' + standRows + '</tbody></table>' +
      '</div>' +
      '<div class="card"><div class="lbl">Scorecard</div>' + buildCard(false) + '</div>' +
      '<div style="text-align:center;padding:8px 0 16px;">' +
        '<button class="btn btn-dark" style="min-width:160px;font-size:15px;height:48px;" onclick="newGame()">New Game &#x26F3;</button>' +
      '</div>';
  }
}

// ── Boot ──
(function() {
  try {
    var raw = localStorage.getItem(SK);
    if (raw) {
      var d = JSON.parse(raw);
      if (d && d.phase && d.phase !== 'setup-count' && d.phase !== 'setup-names') {
        S.phase = d.phase; S.playerCount = d.playerCount || 0;
        S.players = d.players || []; S.scores = d.scores || [];
        S.fireballs = d.fireballs || []; S.holeFireballs = d.holeFireballs || [];
        S.strokeBonus = d.strokeBonus || make9x8();
        S.waterCount = d.waterCount || make9x8();
        S.craftCount = d.craftCount || make9x8();
        S.currentHole = d.currentHole || 0; S.lastAction = d.lastAction || null;
        S.history = []; S.showScorecard = false;
      }
    }
  } catch(e) {}
  render();
})();
</script>
